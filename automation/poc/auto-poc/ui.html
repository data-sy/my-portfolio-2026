<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', sans-serif;
      padding: 16px;
      background: #fff;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #000;
    }
    select, button {
      width: 100%;
      padding: 8px 12px;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    select {
      margin-bottom: 16px;
      background: white;
    }
    button {
      background: #18A0FB;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover {
      background: #0D8BDB;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .status.show {
      display: block;
    }
    .status.success {
      background: #E6F4EA;
      color: #137333;
    }
    .status.error {
      background: #FCE8E6;
      color: #C5221F;
    }
    .status.loading {
      background: #E8F0FE;
      color: #1967D2;
    }
  </style>
</head>
<body>
  <h2>회사 선택</h2>
  <select id="company">
    <option value="">로딩중...</option>
  </select>
  
  <button id="generate">포트폴리오 생성</button>
  
  <div id="status" class="status"></div>

  <script>
    const API_URL = 'http://localhost:3000/api';
    
    const companySelect = document.getElementById('company');
    const generateBtn = document.getElementById('generate');
    const statusDiv = document.getElementById('status');
    
    // 상태 메시지 표시
    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = `status show ${type}`;
    }
    
    // 회사 목록 로드
    async function loadCompanies() {
      try {
        const response = await fetch(`${API_URL}/companies`);
        const result = await response.json();
        
        if (result.success) {
          companySelect.innerHTML = result.companies
            .map(c => `<option value="${c}">${c}</option>`)
            .join('');
        }
      } catch (error) {
        companySelect.innerHTML = '<option value="">서버 연결 실패</option>';
        showStatus('서버가 실행중인지 확인해주세요', 'error');
      }
    }
    
    // 생성 버튼 클릭
    generateBtn.onclick = async () => {
      const company = companySelect.value;
      if (!company) return;
      
      generateBtn.disabled = true;
      showStatus('데이터 로딩중...', 'loading');
      
      try {
        // 1. 서버에서 데이터 가져오기
        const response = await fetch(`${API_URL}/portfolio/${company}`);
        const result = await response.json();
        
        if (!result.success) {
          throw new Error(result.error);
        }
        
        showStatus(`${company} 데이터 로드 완료. 생성중...`, 'loading');
        
        // 2. Figma 플러그인으로 데이터 전달
        parent.postMessage({
          pluginMessage: {
            type: 'generate',
            data: result.data
          }
        }, '*');
        
      } catch (error) {
        showStatus(`오류: ${error.message}`, 'error');
        generateBtn.disabled = false;
      }
    };
    
    // 플러그인으로부터 메시지 받기
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      
      if (msg.type === 'generation-complete') {
        showStatus('✅ 생성 완료!', 'success');
        generateBtn.disabled = false;
      } else if (msg.type === 'generation-error') {
        showStatus(`❌ 생성 실패: ${msg.error}`, 'error');
        generateBtn.disabled = false;
      }
    };
    
    // 초기화
    loadCompanies();
  </script>
</body>
</html>
