<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>언어별 안전성 확보 시점</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #ffffff;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  }
</style>
</head>
<body>
  <svg viewBox="0 0 520 150" width="520" height="150">

    <!-- ═══ Axis labels ═══ -->
    <text x="55" y="26" font-size="12" fill="#1e293b" font-weight="700">컴파일 타임</text>
    <text x="465" y="26" font-size="12" fill="#1e293b" font-weight="700" text-anchor="end">런타임</text>

    <!-- ═══ Axis bar ═══ -->
    <rect x="55" y="52" width="410" height="3" rx="1.5" fill="#cbd5e1"/>

    <!-- Left arrow -->
    <polygon points="47,53.5 57,48 57,59" fill="#cbd5e1"/>
    <!-- Right arrow -->
    <polygon points="473,53.5 463,48 463,59" fill="#cbd5e1"/>

    <!-- ═══ Swift (8/100) ═══ -->
    <circle cx="88" cy="53.5" r="7" fill="#1e293b"/>
    <text x="88" y="79" font-size="13" fill="#1e293b" font-weight="800" text-anchor="middle">Swift</text>
    <text x="88" y="95" font-size="8" fill="#94a3b8" font-weight="500" text-anchor="middle">ARC · Optional · 정적 디스패치</text>

    <!-- ═══ Java (43/100) ═══ -->
    <circle cx="231" cy="53.5" r="7" fill="#1e293b"/>
    <text x="231" y="79" font-size="13" fill="#1e293b" font-weight="800" text-anchor="middle">Java</text>
    <text x="231" y="95" font-size="8" fill="#94a3b8" font-weight="500" text-anchor="middle">정적 타입 · 컴파일 체크</text>

    <!-- ═══ +Spring shift ═══ -->
    <!-- Arrow line -->
    <line x1="245" y1="53.5" x2="285" y2="53.5" stroke="#64748b" stroke-width="2"/>
    <!-- Arrow head -->
    <polygon points="287,53.5 279,49 279,58" fill="#64748b"/>
    <!-- +Spring label above arrow -->
    <text x="266" y="43" font-size="11" fill="#64748b" font-weight="800" text-anchor="middle">+ Spring</text>
    <!-- Spring detail below -->
    <text x="266" y="110" font-size="8" fill="#94a3b8" font-weight="500" text-anchor="middle">런타임 DI · 리플렉션 · AOP</text>

    <!-- ═══ JavaScript (92/100) ═══ -->
    <circle cx="432" cy="53.5" r="7" fill="#1e293b"/>
    <text x="432" y="79" font-size="13" fill="#1e293b" font-weight="800" text-anchor="middle">JavaScript</text>
    <text x="432" y="95" font-size="8" fill="#94a3b8" font-weight="500" text-anchor="middle">동적 타입 · 인터프리터 · GC</text>

  </svg>
</body>
</html>
