<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Cover 2: 거리 계산 방식 비교 v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #ffffff;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .title-label {
    font-size: 14px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .cover {
    width: 714px;
    height: 314px;
    background: transparent;
    border: 2px solid #1a1a1a;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }
  .flow-container {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    height: 100%;
  }
  .step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
  }
  .step-visual {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 0;
  }
  .step-info {
    text-align: center;
    padding-top: 8px;
    flex-shrink: 0;
  }
  .step-badge {
    font-size: 10px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 3px;
  }
  .step-title {
    font-size: 13px;
    font-weight: 700;
    color: #1e293b;
    margin-bottom: 2px;
    letter-spacing: -0.02em;
  }
  .step-desc {
    font-size: 10px;
    color: #64748b;
    line-height: 1.3;
  }
  .step-result {
    font-size: 10px;
    font-weight: 700;
    margin-top: 3px;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 1px 6px;
    border-radius: 3px;
  }
  .result-fail {
    color: #dc2626;
    background: #fef2f2;
  }
  .result-warn {
    color: #d97706;
    background: #fffbeb;
  }
  .result-success {
    color: #059669;
    background: #ecfdf5;
  }
  .arrow-connector {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    align-self: center;
    margin-top: -40px;
  }
  .arrow-connector svg {
    width: 24px;
    height: 24px;
  }
</style>
</head>
<body>
  <div class="title-label">좌표계 특성을 반영한 위치 기반 거리 계산 공식 선택</div>
  <div class="cover">
    <div class="flow-container">

      <!-- ═══ Step 1: BETWEEN (Square bounding) ═══ -->
      <div class="step">
        <div class="step-visual">
          <svg viewBox="0 0 180 170" width="180" height="170">
            <defs>
              <!-- Clip: square minus circle (excess corners only) -->
              <clipPath id="excess-corners">
                <path d="M30,25 H150 V145 H30 Z M90,85 m-60,0 a60,60 0 1,0 120,0 a60,60 0 1,0 -120,0" clip-rule="evenodd"/>
              </clipPath>
            </defs>

            <!-- Circle fill (desired area) -->
            <circle cx="90" cy="85" r="60" fill="#dbeafe" fill-opacity="0.3" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>

            <!-- Square border -->
            <rect x="30" y="25" width="120" height="120" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>

            <!-- Red excess: ONLY the 4 corner regions (square minus circle) -->
            <rect x="30" y="25" width="120" height="120" fill="#ef4444" fill-opacity="0.25" clip-path="url(#excess-corners)"/>

            <!-- Center point -->
            <circle cx="90" cy="85" r="3" fill="#1e293b"/>

            <!-- Radius line (thin dashed) -->
            <line x1="90" y1="85" x2="150" y2="85" stroke="#1e293b" stroke-width="0.8" stroke-dasharray="3,2"/>
            <text x="118" y="80" font-size="9" fill="#1e293b" font-weight="600">1km</text>

            <!-- Excess label at top-right corner -->
            <text x="137" y="38" font-size="8" fill="#dc2626" font-weight="700">초과</text>
            <text x="133" y="48" font-size="8" fill="#dc2626" font-weight="700">27.3%</text>

            <!-- Formula -->
            <text x="90" y="162" font-size="9" fill="#64748b" font-weight="500" text-anchor="middle">위도·경도 BETWEEN</text>
          </svg>
        </div>
        <div class="step-info">
          <div class="step-badge">시도 1</div>
          <div class="step-title">사각형 필터링</div>
          <div class="step-desc">BETWEEN 범위 조회</div>
          <div class="step-result result-fail">✕ 초과 영역 27.3%</div>
        </div>
      </div>

      <!-- Arrow -->
      <div class="arrow-connector">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14M13 6l6 6-6 6" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <!-- ═══ Step 2: Euclidean distance (flat approximation) ═══ -->
      <div class="step">
        <div class="step-visual">
          <svg viewBox="0 0 180 170" width="180" height="170">
            <defs>
              <!-- Clip: ellipse minus circle (crescent excess on left + right) -->
              <clipPath id="crescent-clip">
                <path d="M22,85 a68,58 0 1,0 136,0 a68,58 0 1,0 -136,0 Z M30,85 a60,60 0 1,0 120,0 a60,60 0 1,0 -120,0 Z" clip-rule="evenodd"/>
              </clipPath>
            </defs>

            <!-- Subtle grid -->
            <line x1="30" y1="85" x2="150" y2="85" stroke="#e2e8f0" stroke-width="0.5"/>
            <line x1="90" y1="25" x2="90" y2="145" stroke="#e2e8f0" stroke-width="0.5"/>

            <!-- Ideal circle (dashed, what it should be) -->
            <circle cx="90" cy="85" r="60" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>

            <!-- Distorted ellipse (what Euclidean actually produces) -->
            <ellipse cx="90" cy="85" rx="68" ry="58" fill="none" stroke="#d97706" stroke-width="1.5"/>

            <!-- Yellow crescent areas (ellipse minus circle) -->
            <ellipse cx="90" cy="85" rx="68" ry="58" fill="#fbbf24" fill-opacity="0.2" clip-path="url(#crescent-clip)"/>

            <!-- Center point -->
            <circle cx="90" cy="85" r="3" fill="#1e293b"/>

            <!-- Latitude direction: thin dashed line (correct) -->
            <line x1="90" y1="85" x2="90" y2="27" stroke="#1e293b" stroke-width="0.8" stroke-dasharray="3,2"/>

            <!-- Longitude direction: thin dashed to true boundary, then thick blue for excess -->
            <line x1="90" y1="85" x2="150" y2="85" stroke="#1e293b" stroke-width="0.8" stroke-dasharray="3,2"/>

            <!-- Excess part ONLY: thick blue from circle edge to ellipse edge -->
            <line x1="150" y1="85" x2="158" y2="85" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round"/>
            <!-- Tick marks for bracket -->
            <line x1="150" y1="80" x2="150" y2="90" stroke="#3b82f6" stroke-width="1"/>
            <line x1="158" y1="80" x2="158" y2="90" stroke="#3b82f6" stroke-width="1"/>
            <text x="147" y="100" font-size="8" fill="#3b82f6" font-weight="700">+260m</text>

            <!-- Labels -->
            <text x="73" y="54" font-size="8" fill="#64748b" font-weight="500">위도 ✓</text>
            <text x="123" y="78" font-size="8" fill="#d97706" font-weight="600">경도 ✕</text>

            <!-- Formula -->
            <text x="90" y="162" font-size="9" fill="#64748b" font-weight="500" text-anchor="middle">√(Δx² + Δy²)</text>
          </svg>
        </div>
        <div class="step-info">
          <div class="step-badge">시도 2</div>
          <div class="step-title">평면 유클리드</div>
          <div class="step-desc">POWER 함수 거리 계산</div>
          <div class="step-result result-warn">△ 최대 260m 오차</div>
        </div>
      </div>

      <!-- Arrow -->
      <div class="arrow-connector">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14M13 6l6 6-6 6" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <!-- ═══ Step 3: Haversine (spherical geometry) ═══ -->
      <div class="step">
        <div class="step-visual">
          <svg viewBox="0 0 180 170" width="180" height="170">
            <!-- Sphere outline (dark/neutral) -->
            <circle cx="90" cy="80" r="58" fill="none" stroke="#475569" stroke-width="1.5"/>

            <!-- Latitude lines (dark, subtle) -->
            <ellipse cx="90" cy="48" rx="42" ry="9" fill="none" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="3,3"/>
            <ellipse cx="90" cy="80" rx="58" ry="13" fill="none" stroke="#94a3b8" stroke-width="0.6" stroke-dasharray="3,3"/>
            <ellipse cx="90" cy="112" rx="42" ry="9" fill="none" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="3,3"/>

            <!-- Longitude line (vertical ellipse, subtle) -->
            <ellipse cx="90" cy="80" rx="14" ry="58" fill="none" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="3,3"/>

            <!-- Center point hint (very subtle) -->
            <circle cx="90" cy="80" r="1.5" fill="#94a3b8" opacity="0.4"/>

            <!-- Point A on sphere surface (top-left area) -->
            <circle cx="60" cy="48" r="5" fill="#059669" stroke="#fff" stroke-width="2"/>
            <text x="40" y="45" font-size="9" fill="#059669" font-weight="700">(a, b)</text>

            <!-- Point B on sphere surface (right area) -->
            <circle cx="132" cy="72" r="5" fill="#059669" stroke="#fff" stroke-width="2"/>

            <!-- Great circle arc: curved line on sphere surface from A to B -->
            <!-- This arc curves upward to show it follows the sphere surface -->
            <path d="M60,48 Q90,38 120,52 Q128,56 132,72" fill="none" stroke="#059669" stroke-width="2.8" stroke-linecap="round"/>

            <!-- "r" label along the arc -->
            <text x="100" y="42" font-size="12" fill="#3b82f6" font-weight="700">r</text>

            <!-- Dashed straight line (chord) to contrast with arc -->
            <line x1="60" y1="48" x2="132" y2="72" stroke="#94a3b8" stroke-width="0.7" stroke-dasharray="2,2" opacity="0.5"/>

            <!-- Formula -->
            <text x="90" y="155" font-size="8" fill="#64748b" font-weight="500" text-anchor="middle">2R × arcsin(√(...))</text>
            <text x="90" y="165" font-size="8" fill="#059669" font-weight="600" text-anchor="middle">Haversine</text>
          </svg>
        </div>
        <div class="step-info">
          <div class="step-badge">시도 3</div>
          <div class="step-title">구면 거리 (Haversine)</div>
          <div class="step-desc">구면 기하학 기반 거리</div>
          <div class="step-result result-success">✓ 오차 260m → 2.4m (99%↓)</div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
